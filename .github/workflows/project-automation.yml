name: Project Automation

# Keeps the "Lernza Roadmap" project board in sync with issue/PR lifecycle.
# The board tracks ISSUES only — PRs are never added to the board.
# PRs move their linked issues through statuses via this workflow.
# Zero manual steps — everything is fully event-driven.
#
# Statuses: Backlog → In Progress → In Review → Done / Invalid
#
# ┌─────────────────────────────────────────────────────────────────────┐
# │  Built-in project workflows (configured in project settings UI):   │
# │                                                                    │
# │  ✅ Auto-add to project    filter: is:issue is:open                │
# │  ✅ Item added to project  issue only → Backlog                    │
# │  ✅ Item closed            issue only → Done                       │
# │  ✅ Item reopened          issue only → Backlog                    │
# │  ✅ Auto-close issue       when status = Done → closes issue       │
# │  ❌ All PR-related          OFF (they target PR items, not issues) │
# │                                                                    │
# │  This Actions workflow handles everything else:                    │
# │                                                                    │
# │  Issue Events:                                                     │
# │    assigned              → In Progress (only from Backlog)         │
# │    unassigned (none left)→ Backlog (only from In Progress)         │
# │    closed not_planned    → Invalid (overrides built-in Done)       │
# │                                                                    │
# │  PR Events (affect linked issues):                                 │
# │    PR opened (draft)     → In Progress (from Backlog)              │
# │    PR opened (ready)     → In Review (from Backlog/In Progress)    │
# │    PR ready_for_review   → In Review (from Backlog/In Progress)    │
# │    review requested      → In Review (from Backlog/In Progress)    │
# │    converted to draft    → In Progress (from In Review)            │
# │    changes requested     → In Progress (from In Review)            │
# │    PR closed (not merged)→ In Progress/Backlog (if no other PRs)   │
# │    PR merged             → Done (via auto-close → built-in)        │
# │                                                                    │
# │  Guards:                                                           │
# │    • Never move backwards from Done or Invalid                     │
# │    • Never move from In Review to In Progress on assign            │
# │    • Check for competing PRs before moving off In Review           │
# │    • Uses closingIssuesReferences API + regex fallback             │
# └─────────────────────────────────────────────────────────────────────┘

on:
  issues:
    types: [assigned, unassigned, closed]
  pull_request_target:
    types: [opened, ready_for_review, closed, review_requested, converted_to_draft]
  pull_request_review:
    types: [submitted]

env:
  GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
  PROJECT_OWNER: lernza
  PROJECT_NUMBER: "1"
  STATUS_FIELD_ID: "PVTSSF_lADOC20SDc4BRpIZzg_aUc4"
  PROJECT_ID: "PVT_kwDOC20SDc4BRpIZ"
  STATUS_BACKLOG: "9ee49bec"
  STATUS_IN_PROGRESS: "2f115854"
  STATUS_IN_REVIEW: "cb65cf8c"
  STATUS_DONE: "9e0f6df4"
  STATUS_INVALID: "c099a7e2"

jobs:
  # ─── Issue assigned → In Progress ──────────────────────────────
  # Only from Backlog. Does NOT yank from In Review/Done/Invalid.
  # Does NOT move from In Progress (already there).
  issue-assigned:
    if: github.event_name == 'issues' && github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to In Progress if in Backlog
        run: |
          ITEM_ID=$(gh project item-add $PROJECT_NUMBER \
            --owner $PROJECT_OWNER \
            --url "${{ github.event.issue.html_url }}" \
            --format json | jq -r '.id')

          CURRENT=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .status')

          if [ "$CURRENT" = "Backlog" ] || [ "$CURRENT" = "" ] || [ "$CURRENT" = "null" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → In Progress (was: ${CURRENT:-empty})"
          else
            echo "· #${{ github.event.issue.number }} is $CURRENT, skipped"
          fi

  # ─── Issue unassigned → Backlog (if none left) ─────────────────
  # Only from In Progress. Does NOT move from In Review/Done/Invalid.
  issue-unassigned:
    if: github.event_name == 'issues' && github.event.action == 'unassigned'
    runs-on: ubuntu-latest
    steps:
      - name: Move to Backlog if no assignees and In Progress
        run: |
          ASSIGNEES=$(gh issue view ${{ github.event.issue.number }} \
            --repo ${{ github.repository }} --json assignees -q '.assignees | length')

          if [ "$ASSIGNEES" -gt 0 ]; then
            echo "· Still has $ASSIGNEES assignee(s)"
            exit 0
          fi

          DATA=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

          ITEM_ID=$(echo "$DATA" | awk '{print $1}')
          CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

          [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && exit 0

          if [ "$CURRENT" = "In Progress" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_BACKLOG\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → Backlog (unassigned)"
          else
            echo "· #${{ github.event.issue.number }} is $CURRENT, skipped"
          fi

  # ─── Issue closed not_planned → Invalid ────────────────────────
  issue-closed-not-planned:
    if: >-
      github.event_name == 'issues' &&
      github.event.action == 'closed' &&
      github.event.issue.state_reason == 'not_planned'
    runs-on: ubuntu-latest
    steps:
      - name: Override to Invalid
        run: |
          sleep 3
          ITEM_ID=$(gh project item-list $PROJECT_NUMBER \
            --owner $PROJECT_OWNER --limit 200 --format json | \
            jq -r --arg N "${{ github.event.issue.number }}" \
            '.items[] | select(.content.number == ($N|tonumber)) | .id')

          if [ -n "$ITEM_ID" ] && [ "$ITEM_ID" != "null" ]; then
            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_INVALID\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #${{ github.event.issue.number }} → Invalid"
          fi

  # ─── PR opened → In Progress or In Review ─────────────────────
  # Someone opens a PR linking to an issue. This means they're
  # actively working on it.
  #   Draft PR → issue to In Progress (still coding)
  #   Ready PR → issue to In Review (awaiting review)
  # Only moves forward from Backlog or In Progress. Never backward.
  pr-opened:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'opened'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues based on PR draft state
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
          IS_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          [ -z "$ISSUE_NUMS" ] && echo "· No linked issues" && exit 0

          if [ "$IS_DRAFT" = "true" ]; then
            TARGET="$STATUS_IN_PROGRESS"
            TARGET_NAME="In Progress"
            ALLOWED="Backlog"
          else
            TARGET="$STATUS_IN_REVIEW"
            TARGET_NAME="In Review"
            ALLOWED="Backlog In Progress"
          fi

          for NUM in $ISSUE_NUMS; do
            DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$DATA" | awk '{print $1}')
            CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

            [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && continue

            # Check if current status is in the allowed list
            MOVE=false
            for A in $ALLOWED; do
              [ "$CURRENT" = "$A" ] && MOVE=true
            done
            [ "$CURRENT" = "" ] || [ "$CURRENT" = "null" ] && MOVE=true

            if [ "$MOVE" = "true" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$TARGET\" }
                  }) { projectV2Item { id } }
                }"
              echo "✓ #$NUM → $TARGET_NAME (PR #$PR_NUM opened, was: $CURRENT)"
            else
              echo "· #$NUM is $CURRENT, skipped"
            fi
          done

  # ─── PR ready for review → In Review ──────────────────────────
  # Fires when: draft → ready, OR review explicitly requested.
  # Both mean "please look at this" — issue should be In Review.
  # Only moves from Backlog or In Progress. Never backward.
  pr-ready-for-review:
    if: >-
      github.event_name == 'pull_request_target' &&
      (github.event.action == 'ready_for_review' || github.event.action == 'review_requested')
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Review
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          [ -z "$ISSUE_NUMS" ] && echo "· No linked issues" && exit 0

          for NUM in $ISSUE_NUMS; do
            DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$DATA" | awk '{print $1}')
            CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

            [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && continue

            # Only move forward from Backlog or In Progress
            if [ "$CURRENT" = "Backlog" ] || [ "$CURRENT" = "In Progress" ] || \
               [ "$CURRENT" = "" ] || [ "$CURRENT" = "null" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$STATUS_IN_REVIEW\" }
                  }) { projectV2Item { id } }
                }"
              echo "✓ #$NUM → In Review (PR #$PR_NUM ready, was: $CURRENT)"
            else
              echo "· #$NUM is $CURRENT, skipped"
            fi
          done

  # ─── PR converted to draft → In Progress ──────────────────────
  # Contributor realized it's not ready. Back to work.
  converted-to-draft:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'converted_to_draft'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          [ -z "$ISSUE_NUMS" ] && echo "· No linked issues" && exit 0

          for NUM in $ISSUE_NUMS; do
            DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$DATA" | awk '{print $1}')
            CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

            [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && continue

            if [ "$CURRENT" = "In Review" ]; then
              gh api graphql -f query="
                mutation {
                  updateProjectV2ItemFieldValue(input: {
                    projectId: \"$PROJECT_ID\"
                    itemId: \"$ITEM_ID\"
                    fieldId: \"$STATUS_FIELD_ID\"
                    value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                  }) { projectV2Item { id } }
                }"
              echo "✓ #$NUM → In Progress (PR #$PR_NUM → draft)"
            else
              echo "· #$NUM is $CURRENT, skipped"
            fi
          done

  # ─── Changes requested → In Progress ──────────────────────────
  # Reviewer says "not ready". Only from In Review, and only if
  # no OTHER open non-draft PR for the same issue is still in review.
  changes-requested:
    if: >-
      github.event_name == 'pull_request_review' &&
      github.event.review.state == 'changes_requested'
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues to In Progress if no other PRs awaiting review
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          [ -z "$ISSUE_NUMS" ] && echo "· No linked issues" && exit 0

          for NUM in $ISSUE_NUMS; do
            DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$DATA" | awk '{print $1}')
            CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

            [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && continue
            [ "$CURRENT" != "In Review" ] && echo "· #$NUM is $CURRENT, skipped" && continue

            # Check for OTHER open non-draft PRs linking to this issue
            OTHER=$(gh pr list --repo "$REPO" --state open \
              --json number,body,isDraft -q \
              "[.[] | select(.number != $PR_NUM) | select(.isDraft == false) | select(.body | test(\"(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\\\s+#$NUM\"))] | length" 2>/dev/null || echo "0")

            if [ "$OTHER" -gt 0 ] 2>/dev/null; then
              echo "· #$NUM has $OTHER other ready PR(s), staying In Review"
              continue
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$STATUS_IN_PROGRESS\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #$NUM → In Progress (changes requested on PR #$PR_NUM)"
          done

  # ─── PR closed without merge → In Progress or Backlog ──────────
  # If other open non-draft PRs exist → stay In Review.
  # Otherwise: In Progress if assigned, Backlog if not.
  pr-closed-not-merged:
    if: >-
      github.event_name == 'pull_request_target' &&
      github.event.action == 'closed' &&
      github.event.pull_request.merged == false
    runs-on: ubuntu-latest
    steps:
      - name: Move linked issues based on remaining PRs and assignment
        env:
          PR_NUM: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          OWNER="${REPO%/*}"
          NAME="${REPO#*/}"

          ISSUE_NUMS=$(gh api graphql -f query="
            query {
              repository(owner: \"$OWNER\", name: \"$NAME\") {
                pullRequest(number: $PR_NUM) {
                  closingIssuesReferences(first: 10) {
                    nodes { number }
                  }
                }
              }
            }" -q '.data.repository.pullRequest.closingIssuesReferences.nodes[].number' 2>/dev/null)

          if [ -z "$ISSUE_NUMS" ]; then
            PR_BODY=$(gh pr view "$PR_NUM" --repo "$REPO" --json body -q '.body')
            ISSUE_NUMS=$(echo "$PR_BODY" | \
              grep -oiE '(close[sd]?|fix(e[sd])?|resolve[sd]?)\s+#[0-9]+' | \
              grep -oE '[0-9]+' || true)
          fi

          [ -z "$ISSUE_NUMS" ] && echo "· No linked issues" && exit 0

          for NUM in $ISSUE_NUMS; do
            DATA=$(gh project item-list $PROJECT_NUMBER \
              --owner $PROJECT_OWNER --limit 200 --format json | \
              jq -r --arg N "$NUM" \
              '.items[] | select(.content.number == ($N|tonumber)) | "\(.id) \(.status)"')

            ITEM_ID=$(echo "$DATA" | awk '{print $1}')
            CURRENT=$(echo "$DATA" | cut -d' ' -f2-)

            [ -z "$ITEM_ID" ] || [ "$ITEM_ID" = "null" ] && continue

            # Don't touch terminal states
            if [ "$CURRENT" = "Done" ] || [ "$CURRENT" = "Invalid" ]; then
              echo "· #$NUM is $CURRENT, skipped"
              continue
            fi

            # Check for other open non-draft PRs
            OTHER=$(gh pr list --repo "$REPO" --state open \
              --json number,body,isDraft -q \
              "[.[] | select(.number != $PR_NUM) | select(.isDraft == false) | select(.body | test(\"(?i)(close[sd]?|fix(e[sd])?|resolve[sd]?)\\\\s+#$NUM\"))] | length" 2>/dev/null || echo "0")

            if [ "$OTHER" -gt 0 ] 2>/dev/null; then
              echo "· #$NUM has $OTHER other ready PR(s), staying In Review"
              continue
            fi

            # No other PRs — check assignment
            ASSIGNEES=$(gh issue view "$NUM" \
              --repo "$REPO" --json assignees -q '.assignees | length')

            if [ "$ASSIGNEES" -gt 0 ]; then
              TARGET="$STATUS_IN_PROGRESS"
              NAME="In Progress"
            else
              TARGET="$STATUS_BACKLOG"
              NAME="Backlog"
            fi

            gh api graphql -f query="
              mutation {
                updateProjectV2ItemFieldValue(input: {
                  projectId: \"$PROJECT_ID\"
                  itemId: \"$ITEM_ID\"
                  fieldId: \"$STATUS_FIELD_ID\"
                  value: { singleSelectOptionId: \"$TARGET\" }
                }) { projectV2Item { id } }
              }"
            echo "✓ #$NUM → $NAME (PR #$PR_NUM closed)"
          done
